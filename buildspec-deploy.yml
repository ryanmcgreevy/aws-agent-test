version: 0.2
# Deploy stage buildspec.
#
# Input artifacts (set by pipeline.yml):
#   Primary source : SourceArtifact  — repo contents; this file lives here
#   Secondary source: BuildArtifact  — imageUri.txt from the build stage,
#                     available at $CODEBUILD_SRC_DIR_BuildArtifact/
#
# Environment variables injected by the CodeBuild project (set in pipeline.yml):
#   ECR_REPO_URI         — full ECR repository URI
#   EXECUTION_ROLE_ARN   — AgentCore execution role ARN
#   AGENT_RUNTIME_NAME   — AgentCore runtime name (matches naming constraints)
#   AGENT_NETWORK_MODE   — PUBLIC or VPC
#   AGENT_ENDPOINT_NAME  — endpoint qualifier name (e.g. prod)
#   SSM_RUNTIME_ID_PATH  — SSM parameter path storing the runtime ID
#   KNOWLEDGE_BASE_ID              — Bedrock knowledge base ID
#   KNOWLEDGE_BASE_DATA_SOURCE_NAME — Managed KB data source name to ensure
#   KNOWLEDGE_BASE_SOURCE_BUCKET   — S3 bucket for KB source documents
#   AWS_ACCOUNT_ID                 — Account ID for data source connection
#
# First-run logic:
#   SSM value == "NONE"  → create-agent-runtime (or adopt existing by name), store ID
#   SSM value != "NONE"  → update-agent-runtime, update-endpoint to latest version

phases:
  pre_build:
    commands:
      - echo "==> Reading image URI from build artifact"
      - IMAGE_URI=$(cat "$CODEBUILD_SRC_DIR_BuildArtifact/imageUri.txt")
      - echo "Deploying image $IMAGE_URI"
      - echo "==> Reading runtime ID from SSM ($SSM_RUNTIME_ID_PATH)"
      - RUNTIME_ID=$(aws ssm get-parameter --name "$SSM_RUNTIME_ID_PATH" --query Parameter.Value --output text)
      - echo "Current runtime ID = $RUNTIME_ID"

  build:
    commands:
      # ── Create or update the AgentCore runtime ─────────────────────────────
      - |
        if [[ "$RUNTIME_ID" == "NONE" ]]; then
          echo "==> First run: creating AgentCore runtime"
          set +e
          RESPONSE=$(aws bedrock-agentcore-control create-agent-runtime \
            --agent-runtime-name "$AGENT_RUNTIME_NAME" \
            --agent-runtime-artifact "{\"containerConfiguration\":{\"containerUri\":\"$IMAGE_URI\"}}" \
            --role-arn "$EXECUTION_ROLE_ARN" \
            --network-configuration "{\"networkMode\":\"$AGENT_NETWORK_MODE\"}" \
            --protocol-configuration '{"serverProtocol":"HTTP"}' \
            --region "$AWS_DEFAULT_REGION" \
            --output json 2>&1)
          CREATE_EXIT=$?
          set -e

          if [[ $CREATE_EXIT -eq 0 ]]; then
            RUNTIME_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['agentRuntimeId'])")
            echo "Runtime created: $RUNTIME_ID"
          else
            if echo "$RESPONSE" | grep -q "ConflictException"; then
              echo "Runtime name already exists; looking up existing runtime ID by name"
              EXISTING_ID=$(aws bedrock-agentcore-control list-agent-runtimes \
                --region "$AWS_DEFAULT_REGION" \
                --query "agentRuntimes[?agentRuntimeName=='$AGENT_RUNTIME_NAME'].agentRuntimeId | [0]" \
                --output text)
              if [[ -z "$EXISTING_ID" || "$EXISTING_ID" == "None" || "$EXISTING_ID" == "null" ]]; then
                echo "Conflict detected, but existing runtime ID could not be resolved. Aborting."
                echo "$RESPONSE"
                exit 1
              fi
              RUNTIME_ID="$EXISTING_ID"
              echo "Adopted existing runtime: $RUNTIME_ID"
            else
              echo "create-agent-runtime failed:"
              echo "$RESPONSE"
              exit 1
            fi
          fi

          echo "==> Updating runtime $RUNTIME_ID with latest container image"
          aws bedrock-agentcore-control update-agent-runtime \
            --agent-runtime-id "$RUNTIME_ID" \
            --agent-runtime-artifact "{\"containerConfiguration\":{\"containerUri\":\"$IMAGE_URI\"}}" \
            --role-arn "$EXECUTION_ROLE_ARN" \
            --network-configuration "{\"networkMode\":\"$AGENT_NETWORK_MODE\"}" \
            --protocol-configuration '{"serverProtocol":"HTTP"}' \
            --region "$AWS_DEFAULT_REGION"

          aws ssm put-parameter \
            --name "$SSM_RUNTIME_ID_PATH" \
            --value "$RUNTIME_ID" \
            --type String \
            --overwrite \
            --region "$AWS_DEFAULT_REGION"
        else
          echo "==> Subsequent run: updating AgentCore runtime $RUNTIME_ID"
          aws bedrock-agentcore-control update-agent-runtime \
            --agent-runtime-id "$RUNTIME_ID" \
            --agent-runtime-artifact "{\"containerConfiguration\":{\"containerUri\":\"$IMAGE_URI\"}}" \
            --role-arn "$EXECUTION_ROLE_ARN" \
            --network-configuration "{\"networkMode\":\"$AGENT_NETWORK_MODE\"}" \
            --protocol-configuration '{"serverProtocol":"HTTP"}' \
            --region "$AWS_DEFAULT_REGION"
        fi

      # ── Wait for runtime to become READY ──────────────────────────────────
      - |
        echo "==> Waiting for runtime READY (max 10 minutes)"
        STATUS="UNKNOWN"
        for i in $(seq 1 60); do
          STATUS=$(aws bedrock-agentcore-control get-agent-runtime \
            --agent-runtime-id "$RUNTIME_ID" \
            --region "$AWS_DEFAULT_REGION" \
            --query status \
            --output text)
          echo "Status: $STATUS (attempt $i/60)"
          [[ "$STATUS" == "READY" ]] && break
          if [[ "$STATUS" == "FAILED" ]]; then
            echo "Runtime entered FAILED state. Aborting."
            exit 1
          fi
          sleep 10
        done
        if [[ "$STATUS" != "READY" ]]; then
          echo "Runtime did not become READY in time. Aborting."
          exit 1
        fi

      # ── Create or update the endpoint ─────────────────────────────────────
      - |
        ENDPOINT_STATUS=$(aws bedrock-agentcore-control get-agent-runtime-endpoint \
          --agent-runtime-id "$RUNTIME_ID" \
          --endpoint-name "$AGENT_ENDPOINT_NAME" \
          --region "$AWS_DEFAULT_REGION" \
          --query status \
          --output text 2>/dev/null || echo "NOT_FOUND")

        if [[ "$ENDPOINT_STATUS" == "NOT_FOUND" ]]; then
          echo "==> Creating endpoint $AGENT_ENDPOINT_NAME"
          aws bedrock-agentcore-control create-agent-runtime-endpoint \
            --agent-runtime-id "$RUNTIME_ID" \
            --name "$AGENT_ENDPOINT_NAME" \
            --region "$AWS_DEFAULT_REGION"
        else
          echo "==> Updating endpoint $AGENT_ENDPOINT_NAME to latest runtime version"
          LATEST_VERSION=$(aws bedrock-agentcore-control get-agent-runtime \
            --agent-runtime-id "$RUNTIME_ID" \
            --region "$AWS_DEFAULT_REGION" \
            --query agentRuntimeVersion \
            --output text)
          aws bedrock-agentcore-control update-agent-runtime-endpoint \
            --agent-runtime-id "$RUNTIME_ID" \
            --endpoint-name "$AGENT_ENDPOINT_NAME" \
            --agent-runtime-version "$LATEST_VERSION" \
            --region "$AWS_DEFAULT_REGION"
        fi

      # ── Ensure managed knowledge base data source exists ─────────────────
      - |
        echo "==> Ensuring managed data source exists for knowledge base $KNOWLEDGE_BASE_ID"
        DS_ID=$(aws bedrock-agent list-data-sources \
          --knowledge-base-id "$KNOWLEDGE_BASE_ID" \
          --query "dataSourceSummaries[?name=='$KNOWLEDGE_BASE_DATA_SOURCE_NAME'].dataSourceId | [0]" \
          --output text)

        if [[ -z "$DS_ID" || "$DS_ID" == "None" || "$DS_ID" == "null" ]]; then
          echo "==> Creating managed data source $KNOWLEDGE_BASE_DATA_SOURCE_NAME"
          CREATE_DS_RESPONSE=$(aws bedrock-agent create-data-source \
            --name "$KNOWLEDGE_BASE_DATA_SOURCE_NAME" \
            --description "Managed S3 source documents from $KNOWLEDGE_BASE_SOURCE_BUCKET" \
            --knowledge-base-id "$KNOWLEDGE_BASE_ID" \
            --data-deletion-policy RETAIN \
            --data-source-configuration "{\"type\":\"MANAGED_KNOWLEDGE_BASE_CONNECTOR\",\"managedKnowledgeBaseConnectorConfiguration\":{\"connectorParameters\":{\"type\":\"S3\",\"version\":\"1\",\"connectionConfiguration\":{\"bucketName\":\"$KNOWLEDGE_BASE_SOURCE_BUCKET\",\"bucketOwnerAccountId\":\"$AWS_ACCOUNT_ID\"},\"deletionProtectionConfiguration\":{\"enableDeletionProtection\":false}}}}" \
            --region "$AWS_DEFAULT_REGION" \
            --output json)

          DS_ID=$(echo "$CREATE_DS_RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin)['dataSource']['dataSourceId'])")
          echo "Created data source: $DS_ID"

          echo "==> Starting initial ingestion for new data source"
          aws bedrock-agent start-ingestion-job \
            --knowledge-base-id "$KNOWLEDGE_BASE_ID" \
            --data-source-id "$DS_ID" \
            --description "Initial ingestion after managed data source creation" \
            --region "$AWS_DEFAULT_REGION"
        else
          echo "==> Data source already exists: $DS_ID"
        fi

      - echo "==> Deployment complete"
